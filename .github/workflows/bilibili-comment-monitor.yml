name: Bilibili Comment Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bilibili-comment-monitor
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check comment count
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python monitor_bilibili_comments.py --cloud-check --no-open --targets 415

      - name: Commit alert state
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain .bilibili_comment_state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .bilibili_comment_state.json
            git commit -m "Update Bilibili comment monitor state"
            git push
          else
            echo "No state changes."
          fi
